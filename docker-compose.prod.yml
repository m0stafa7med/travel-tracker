services:
  database:
    image: mysql:8.0
    container_name: travel-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
      MYSQL_DATABASE: travel_tracker
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-internal

  backend:
    build: ./backend
    container_name: travel-tracker-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/travel_tracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-StrongPassword123!}
      APP_JWT_SECRET: ${JWT_SECRET:-YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!!}
      APP_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    networks:
      - travel-internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.travel-api.rule=Host(`travel.mostafadarwesh.com`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`))"
      - "traefik.http.routers.travel-api.entrypoints=websecure"
      - "traefik.http.routers.travel-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.travel-api.priority=2"
      - "traefik.http.services.travel-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.travel-api.service=travel-api"

  frontend:
    build:
      context: ./frontend
      args:
        MAPBOX_TOKEN: ${MAPBOX_TOKEN:-pk.eyJ1IjoibTBzdGFmYWRhcndlNCIsImEiOiJjbW15emF6NHMwMm4wMnBxc2V6NGZwa3dyIn0.3WKQvIiDQmj5EpopkyilJw}
    container_name: travel-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - travel-internal
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.travel-web.rule=Host(`travel.mostafadarwesh.com`)"
      - "traefik.http.routers.travel-web.entrypoints=websecure"
      - "traefik.http.routers.travel-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.travel-web.loadbalancer.server.port=80"
      - "traefik.http.routers.travel-web.priority=1"

volumes:
  mysql_data:
  uploads_data:

networks:
  travel-internal:
    driver: bridge
  traefik-net:
    external: true
